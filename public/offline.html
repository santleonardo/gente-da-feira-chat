<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sem conexão — Gente da Feira</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7f9fa;color:#0A4D5C;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;text-align:center}
    .icon{width:64px;height:64px;background:#e1f5ee;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem}
    .icon svg{width:32px;height:32px;stroke:#0A4D5C;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
    h1{font-size:1.4rem;font-weight:500;margin-bottom:.5rem}
    p{color:#4a7a85;font-size:.95rem;line-height:1.6;max-width:280px;margin:0 auto 1.5rem}
    button{padding:.75rem 2rem;background:#0A4D5C;color:#fff;border:none;border-radius:2rem;font-size:1rem;cursor:pointer;transition:opacity .2s}
    button:hover{opacity:.85}
  </style>
</head>
<body>
  <div>
    <div class="icon">
      <svg viewBox="0 0 24 24"><path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg>
    </div>
    <h1>Você está offline</h1>
    <p>Verifique sua conexão e tente novamente para voltar ao bate-papo do bairro.</p>
    <button onclick="window.location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
